spring:
  application:
    temp:
      dir: ./temp
  datasource:
    url: jdbc:postgresql://${DB_host}/Qual_ea_Boa
    username: ${DB_User}
    password: ${Password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
